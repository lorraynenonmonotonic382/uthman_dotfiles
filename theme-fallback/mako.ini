# Typography
font=FiraCode Nerd Font 10

# Layout
width=400
height=140
padding=20
margin=16
border-size=0
border-radius=12
icon-location=left
max-icon-size=64

# Colors (snow_black fallback)
background-color=#121412ee
text-color=#e3e3df
border-color=#afd0b300

# Positioning
anchor=top-right
layer=overlay

# Timing
default-timeout=5000
ignore-timeout=0

# Shadows & Effects
markup=1
max-visible=3
sort=-time

# Progress bar
progress-color=over #afd0b3

[urgency=low]
background-color=#121412dd
border-color=#bdcabc

[urgency=normal]
background-color=#121412ee
border-color=#afd0b3

[urgency=critical]
background-color=#ffb4ab
text-color=#121412
border-color=#ffb4ab
border-size=2
default-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
